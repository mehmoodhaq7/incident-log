version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Admin@123
      MYSQL_DATABASE: incident_log
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  api:
    build: ./api
    container_name: incident-api
    restart: always
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Admin@123
      DB_NAME: incident_log
      JWT_SECRET: incidentlog-super-secret-key
      PORT: 5000
    depends_on:
      - mysql
    ports:
      - "5000:5000"

  client:
    build: ./client
    container_name: incident-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mysql-data:
